<script>
function startQuiz() {
    document.getElementById("welcomeScreen").classList.add("hidden");
    document.getElementById("quizForm").classList.remove("hidden");
}

function calculateScore() {
    let correct = { q1: "b", q2: "a", q3: "a", q4: "b" };
    let score = 0;

    for (let q in correct) {
        let answer = document.querySelector(`input[name="${q}"]:checked`);
        if (answer && answer.value === correct[q]) score++;
    }

    let percent = (score / 4) * 100;
    let rounded = Math.round(percent); 
    let imageName = "";

    if (rounded === 100) imageName = "100.jpg";
    else if (rounded >= 75) imageName = "75.jpg";
    else if (rounded >= 50) imageName = "50.jpg";
    else if (rounded >= 25) imageName = "25.jpg";
    else imageName = "0.jpg";

    document.getElementById("quizForm").classList.add("hidden");
    document.getElementById("resultScreen").classList.remove("hidden");

    document.getElementById("result").innerHTML = `Tačnost: ${rounded}%`;
    document.getElementById("resultImage").src = imageName;
}

function restartQuiz() {
    document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
    document.getElementById("resultScreen").classList.add("hidden");
    document.getElementById("welcomeScreen").classList.remove("hidden");
}
</script>
