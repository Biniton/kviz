<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kviz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        .question {
            margin-bottom: 20px;
            text-align: left;
            display: inline-block;
        }

        img {
            width: 200px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- POČETNI EKRAN -->
    <div id="welcomeScreen">
        <h2>Dobrodošli u kviz!</h2>
        <button onclick="startQuiz()">Započni kviz</button>
    </div>

    <!-- KVIZ -->
    <form id="quizForm" class="hidden">
        <div class="question">
            <p>1. Koja je boja neba?</p>
            <label><input type="radio" name="q1" value="a"> Zelena</label><br>
            <label><input type="radio" name="q1" value="b"> Plava</label><br>
            <label><input type="radio" name="q1" value="c"> Crvena</label>
        </div>

        <div class="question">
            <p>2. Koliko je 2 + 2?</p>
            <label><input type="radio" name="q2" value="a"> 4</label><br>
            <label><input type="radio" name="q2" value="b"> 5</label><br>
            <label><input type="radio" name="q2" value="c"> 22</label>
        </div>

        <div class="question">
            <p>3. Šta je voda?</p>
            <label><input type="radio" name="q3" value="a"> Tečnost</label><br>
            <label><input type="radio" name="q3" value="b"> Gas</label><br>
            <label><input type="radio" name="q3" value="c"> Čvrsto</label>
        </div>

        <div class="question">
            <p>4. Koja životinja mjauče?</p>
            <label><input type="radio" name="q4" value="a"> Pas</label><br>
            <label><input type="radio" name="q4" value="b"> Mačka</label><br>
            <label><input type="radio" name="q4" value="c"> Krava</label>
        </div>

        <button type="button" onclick="calculateScore()">Pošalji odgovore</button>
    </form>

    <!-- REZULTAT -->
    <div id="resultScreen" class="hidden">
        <h3>Rezultat</h3>
        <div id="result"></div>
        <img id="resultImage" src="" alt="Rezultat">
        <br><br>
        <button onclick="restartQuiz()">Pokušaj ponovo</button>
    </div>

    <!-- SCRIPT -->
    <script>
        function startQuiz() {
            document.getElementById("welcomeScreen").classList.add("hidden");
            document.getElementById("quizForm").classList.remove("hidden");
        }

        function calculateScore() {
            let correct = { q1: "b", q2: "a", q3: "a", q4: "b" };
            let score = 0;

            for (let q in correct) {
                let answer = document.querySelector(`input[name="${q}"]:checked`);
                if (answer && answer.value === correct[q]) score++;
            }

            let percent = (score / 4) * 100;
            let rounded = Math.round(percent);
            let imageName = "";

            if (rounded === 100) imageName = "100.jpg";
            else if (rounded >= 75) imageName = "75.jpg";
            else if (rounded >= 50) imageName = "50.jpg";
            else if (rounded >= 25) imageName = "25.jpg";
            else imageName = "0.jpg";

            document.getElementById("quizForm").classList.add("hidden");
            document.getElementById("resultScreen").classList.remove("hidden");

            document.getElementById("result").innerHTML = `Tačnost: ${rounded}%`;
            document.getElementById("resultImage").src = imageName;
        }

        function restartQuiz() {
            document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
            document.getElementById("resultScreen").classList.add("hidden");
            document.getElementById("welcomeScreen").classList.remove("hidden");
        }
    </script>

</body>
</html>
